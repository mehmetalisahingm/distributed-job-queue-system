services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-job_queue}
      POSTGRES_USER: ${POSTGRES_USER:-jobqueue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobqueue}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-jobqueue} -d ${POSTGRES_DB:-job_queue}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    command: >
      sh -c "npm run prisma:deploy --workspace @distributed-job-queue/backend
      && npm run start:api --workspace @distributed-job-queue/backend"
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-4000}
      WEB_ORIGIN: http://localhost:${WEB_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://jobqueue:jobqueue@postgres:5432/job_queue?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      QUEUE_NAME: jobs
      DEAD_LETTER_QUEUE_NAME: jobs-dead-letter
      JOB_MAX_ATTEMPTS: ${JOB_MAX_ATTEMPTS:-3}
      JOB_BACKOFF_DELAY_MS: ${JOB_BACKOFF_DELAY_MS:-2000}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      METRICS_PREFIX: distributed_job_queue_
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${API_PORT:-4000}:4000'

  worker:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    command: >
      sh -c "npm run prisma:deploy --workspace @distributed-job-queue/backend
      && npm run start:worker --workspace @distributed-job-queue/backend"
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-4000}
      WEB_ORIGIN: http://localhost:${WEB_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://jobqueue:jobqueue@postgres:5432/job_queue?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      QUEUE_NAME: jobs
      DEAD_LETTER_QUEUE_NAME: jobs-dead-letter
      JOB_MAX_ATTEMPTS: ${JOB_MAX_ATTEMPTS:-3}
      JOB_BACKOFF_DELAY_MS: ${JOB_BACKOFF_DELAY_MS:-2000}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      METRICS_PREFIX: distributed_job_queue_
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    command: >
      sh -c "npm run start --workspace @distributed-job-queue/web -- --host 0.0.0.0 --port 3000"
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT:-4000}
    depends_on:
      api:
        condition: service_started
    ports:
      - '${WEB_PORT:-3000}:3000'

volumes:
  postgres-data:
  redis-data:
